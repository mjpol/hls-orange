services:
  hls-streamer:
    build: .
    container_name: hls-orange
    restart: unless-stopped
    network_mode: host          # necesario para recibir multicast
    environment:
      - MULTICAST_URL=udp://239.0.0.1:1234
      - MULTICAST_IFACE=eth0    # interfaz que tiene suscripción al grupo multicast
      - STREAM_NAME=live
      - SEGMENT_TIME=4
      - SEGMENT_LIST_SIZE=5
      - ABR_MODE=true
      - RESTART_DELAY=3
    volumes:
      - ./hls:/opt/hls-orange/hls
      - ./logs:/opt/hls-orange/logs
    # Alternativa sin network_mode host (unicast/IPTV por túnel):
    # ports:
    #   - "8080:8080"
